# Prod: API + banco completo em containers

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autodata-api
    ports:
      - "4000:4000"
    env_file:
      - .env.prod
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - autodata-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: autodata-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - autodata-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  autodata-net:
    driver: bridge

volumes:
  mongo-data:
